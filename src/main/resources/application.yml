spring:
  application:
    name: nexarank-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://nexarank-postgres-postgresql.default.svc.cluster.local:5432/nexarank}
    username: ${DB_USERNAME:nexarank}
    password: ${DB_PASSWORD:nexarank2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.nexarank: DEBUG

nexarank:
  jwt:
    secret: ${JWT_SECRET:nexarank-dev-secret-key-2026-minimum-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  search-api:
    base-url: http://search-api.default.svc.cluster.local/api/v1
    api-key: searchx-dev-key-2026
