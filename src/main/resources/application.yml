spring:
  application:
    name: nexarank-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://nexarank-postgres-postgresql.default.svc.cluster.local:5432/nexarank}
    username: ${DB_USERNAME:nexarank}
    password: ${DB_PASSWORD:nexarank2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: modernreliability@gmail.com
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    mail:
      enabled: false

logging:
  level:
    com.nexarank: DEBUG

nexarank:
  jwt:
    secret: ${JWT_SECRET:nexarank-dev-secret-key-2026-minimum-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  search-api:
    base-url: http://search-api.default.svc.cluster.local/api/v1
    api-key: searchx-dev-key-2026
  report:
    recipients: modernreliability@gmail.com
    from: modernreliability@gmail.com
    cron: "0 0 8 * * MON"

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma3:1b}