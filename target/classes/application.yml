spring:
  application:
    name: nexarank-api
  elasticsearch:
    uris: ${ES_URI:https://localhost:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:changeme}
    socket-timeout: 30s
    connection-timeout: 5s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.nexarank: DEBUG

nexarank:
  jwt:
    secret: ${JWT_SECRET:nexarank-dev-secret-key-2026-minimum-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
